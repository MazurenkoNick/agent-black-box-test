services:
  tb-monolith:
    restart: always
    image: "${DOCKER_REPO}/${TB_NODE_DOCKER_NAME}:${TB_VERSION}"
    ports:
      - "7070"
      - "8080"
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "30"
    environment:
      TB_SERVICE_ID: tb-monolith
      TB_SERVICE_TYPE: monolith
      MQTT_ENABLED: "false"
      COAP_ENABLED: "false"
      LWM2M_ENABLED: "false"
      SNMP_ENABLED: "false"
      EDGES_ENABLED: "true"
      TB_QUEUE_TYPE: "kafka"
      TB_KAFKA_SERVERS: "kafka:9092"
      AGENT_APP_TEMPLATE_SYNC_ENABLED: "true"
      AGENT_APP_TEMPLATE_SYNC_REPO_URI: "file:///agent-templates"
      AGENT_APP_TEMPLATE_SYNC_BRANCH: "main"
      AGENT_APP_TEMPLATE_SYNC_BASE_PATH: "templates"
      AGENT_APP_TEMPLATE_SYNC_FETCH_FREQUENCY_MS: "5000"
    env_file:
      - ./tb-node.env
    volumes:
      - ./tb-node/conf:/config
      - ./agent-templates:/agent-templates:ro
    depends_on:
      - kafka
  kafka:
    restart: always
    image: "bitnamilegacy/kafka:4.0.0-debian-12-r10"
    ports:
      - "9092"
    environment:
      KAFKA_CFG_ADVERTISED_LISTENERS: "INSIDE://:9094,OUTSIDE://kafka:9092"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
    env_file:
      - ./kafka.env
  dind:
    restart: always
    image: "docker:dind"
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    ports:
      - "2375"
  tb-agent:
    restart: always
    image: "${TB_AGENT_DOCKER_NAME}:${TB_AGENT_VERSION}"
    environment:
      TB_SERVER_ADDR: "tb-monolith:7070"
      TB_AGENT_ROUTING_KEY: "${AGENT_ROUTING_KEY}"
      TB_AGENT_ROUTING_SECRET: "${AGENT_ROUTING_SECRET}"
      DOCKER_HOST: "tcp://dind:2375"
      TB_COMPOSE_SYNC_INTERVAL_SEC: "10"
    depends_on:
      - tb-monolith
      - dind
